name: DevSecOps Pipeline - SecurePipeline Lab

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  sast-semgrep:
    name: SAST Semgrep
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install and run Semgrep
        run: |
          pip install --upgrade semgrep
          semgrep --config=auto --sarif --output=semgrep.sarif . || true
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  sca-snyk:
    name: SCA Snyk
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk SCA
        run: |
          snyk test --all-projects --severity-threshold=high --sarif-file-output=snyk.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: snyk

  secrets-scan:
    name: Secrets Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container Trivy Gate
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-snyk]
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build jar with Maven
        run: mvn clean package -DskipTests -pl webgoat -am

      - name: Build Docker image
        run: docker build -t webgoat-app:${{ github.sha }} .

      - name: Trivy container CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: webgoat-app:${{ github.sha }}
          format: sarif
          output: trivy-container.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

  iac-scan:
    name: IaC Checkov
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

  k8s-scan:
    name: K8s Trivy Misconfig
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy K8s manifest scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/k8s/
          format: sarif
          output: trivy-k8s.sarif
          exit-code: '0'
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-k8s.sarif
          category: trivy-k8s

  dast-zap:
    name: DAST OWASP ZAP
    runs-on: ubuntu-latest
    needs: [container-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build jar with Maven
        run: mvn clean package -DskipTests -pl webgoat -am

      - name: Build and start WebGoat
        run: |
          docker build -t webgoat-app:latest .
          docker run -d --name webgoat \
            -p 8080:8080 \
            webgoat-app:latest
          echo "Waiting 120s for WebGoat to boot..."
          sleep 120

      - name: Confirm app is live
        run: curl --retry 10 --retry-delay 10 --retry-connrefused -f http://localhost:8080/WebGoat/ || echo "App not ready but continuing"

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080/WebGoat/'
          fail_action: false
          cmd_options: '-a'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
