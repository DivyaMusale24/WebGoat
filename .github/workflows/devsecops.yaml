name: DevSecOps Pipeline - SecurePipeline Lab

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

# ─────────────────────────────────────────
# JOB 1: SAST - Semgrep
# ─────────────────────────────────────────
  sast-semgrep:
    name: "SAST · Semgrep"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/java
            p/owasp-top-ten
            p/secrets
          generateSarif: "1"

      - name: Upload SARIF → GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

# ─────────────────────────────────────────
# JOB 2: SCA - Snyk
# ─────────────────────────────────────────
  sca-snyk:
    name: "SCA · Snyk"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Snyk SCA
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload SARIF → GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: snyk

# ─────────────────────────────────────────
# JOB 3: Secrets - Gitleaks
# ─────────────────────────────────────────
  secrets-scan:
    name: "Secrets · Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─────────────────────────────────────────
# JOB 4: Container Scan - Trivy (SECURITY GATE)
# ─────────────────────────────────────────
  container-scan:
    name: "Container · Trivy (Gate)"
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-snyk]
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t webgoat-app:${{ github.sha }} .

      - name: Trivy - container CVE scan (GATE on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: webgoat-app:${{ github.sha }}
          format: sarif
          output: trivy-container.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'           # set to '1' to enforce hard gate

      - name: Upload SARIF → GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

# ─────────────────────────────────────────
# JOB 5: IaC Scan - Checkov
# ─────────────────────────────────────────
  iac-scan:
    name: "IaC · Checkov"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true

      - name: Upload SARIF → GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

# ─────────────────────────────────────────
# JOB 6: K8s Manifest Scan - Trivy Misconfig
# ─────────────────────────────────────────
  k8s-scan:
    name: "K8s · Trivy Misconfig"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - K8s manifest misconfiguration scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/k8s/
          format: sarif
          output: trivy-k8s.sarif
          exit-code: '0'

      - name: Upload SARIF → GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-k8s.sarif
          category: trivy-k8s

# ─────────────────────────────────────────
# JOB 7: DAST - OWASP ZAP
# ─────────────────────────────────────────
  dast-zap:
    name: "DAST · OWASP ZAP"
    runs-on: ubuntu-latest
    needs: [container-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start WebGoat
        run: |
          docker build -t webgoat-app:latest .
          docker run -d --name webgoat \
            -p 8080:8080 \
            -e WEBGOAT_HOST=0.0.0.0 \
            webgoat-app:latest
          echo "Waiting 90s for WebGoat to boot..."
          sleep 90

      - name: Confirm app is live
        run: |
          curl --retry 10 --retry-delay 10 \
               --retry-connrefused \
               -f http://localhost:8080/WebGoat/ \
          || echo "App may not be fully ready - continuing"

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080/WebGoat/'
          fail_action: false
          cmd_options: '-a'

      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
